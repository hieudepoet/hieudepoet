name: Update README assets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  update-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate safe local SVG assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: hieudepoet
        run: |
          python3 <<'PY'
          import os
          import html
          import json
          import math
          import urllib.request
          from collections import Counter
          from pathlib import Path

          username = os.getenv("USERNAME", "hieudepoet")
          token = os.getenv("GITHUB_TOKEN", "")
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": f"{username}-profile-readme-assets",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          root = Path(".")
          assets = root / "assets"
          output = root / "output"
          assets.mkdir(exist_ok=True)
          output.mkdir(exist_ok=True)

          def api_json(url, fallback):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=20) as res:
                      return json.loads(res.read().decode("utf-8"))
              except Exception:
                  return fallback

          def write(path, content):
              Path(path).write_text(content, encoding="utf-8")

          def esc(value):
              return html.escape(str(value), quote=True)

          user = api_json(f"https://api.github.com/users/{username}", {})

          repos = []
          page = 1
          while page <= 10:
              chunk = api_json(
                  f"https://api.github.com/users/{username}/repos?per_page=100&page={page}&sort=updated&direction=desc",
                  [],
              )
              if not isinstance(chunk, list) or not chunk:
                  break
              repos.extend(chunk)
              if len(chunk) < 100:
                  break
              page += 1

          public_repos = [r for r in repos if not r.get("fork") and not r.get("archived")]
          lang_bytes = Counter()

          for repo in public_repos[:80]:
              langs_url = repo.get("languages_url")
              if not langs_url:
                  continue
              langs = api_json(langs_url, {})
              if isinstance(langs, dict):
                  lang_bytes.update(langs)

          language_colors = {
              "TypeScript": "3178c6",
              "JavaScript": "f7df1e",
              "HTML": "e34c26",
              "CSS": "663399",
              "Java": "b07219",
              "C++": "00599c",
              "C": "555555",
              "Python": "3776ab",
              "Move": "6C63FF",
              "Shell": "89e051",
              "Dockerfile": "384d54",
              "MDX": "1f6feb",
          }

          total_lang = sum(lang_bytes.values()) or 1
          top_langs = lang_bytes.most_common(10)

          badge_parts = []
          for lang, count in top_langs:
              pct = count / total_lang * 100
              color = language_colors.get(lang, "6C63FF")
              label = esc(lang)
              text_color = "111827" if color.lower() in {"f7df1e"} else "ffffff"
              badge_parts.append(
                  f'<g transform="translate(0,{len(badge_parts)*36})">'
                  f'<rect width="760" height="28" rx="14" fill="#0f172a"/>'
                  f'<rect width="{max(12, min(760, pct*7.6)):.1f}" height="28" rx="14" fill="#{color}"/>'
                  f'<text x="18" y="19" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="700" fill="#{text_color}">{label}</text>'
                  f'<text x="742" y="19" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="700" text-anchor="end" fill="#e5e7eb">{pct:.1f}%</text>'
                  f'</g>'
              )

          if not badge_parts:
              badge_parts.append(
                  '<text x="20" y="50" font-family="Inter, Segoe UI, Arial" font-size="16" fill="#e5e7eb">Language data will appear after the workflow can access public repositories.</text>'
              )

          lang_height = max(120, 70 + len(top_langs) * 36)
          write(
              assets / "language-badges.svg",
              f'''<svg width="800" height="{lang_height}" viewBox="0 0 800 {lang_height}" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Language footprint">
          <rect width="800" height="{lang_height}" rx="22" fill="#020617"/>
          <text x="28" y="38" font-family="Inter, Segoe UI, Arial" font-size="22" font-weight="800" fill="#ffffff">Language footprint</text>
          <text x="772" y="38" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="600" text-anchor="end" fill="#94a3b8">Generated from public repos</text>
          <g transform="translate(20,62)">
          {''.join(badge_parts)}
          </g>
          </svg>''',
          )

          name = user.get("name") or username
          followers = user.get("followers", "—")
          following = user.get("following", "—")
          repo_count = user.get("public_repos", len(repos) if repos else "—")
          total_stars = sum(int(r.get("stargazers_count") or 0) for r in public_repos)
          total_forks = sum(int(r.get("forks_count") or 0) for r in public_repos)

          summary_cards = [
              ("Public repos", repo_count),
              ("Followers", followers),
              ("Stars", total_stars),
              ("Forks", total_forks),
          ]
          card_svg = []
          for i, (label, value) in enumerate(summary_cards):
              x = 30 + i * 185
              card_svg.append(f'''
              <g transform="translate({x},82)">
                <rect width="160" height="88" rx="18" fill="#0f172a" stroke="#1e293b"/>
                <text x="80" y="36" font-family="Inter, Segoe UI, Arial" font-size="28" font-weight="800" text-anchor="middle" fill="#22d3ee">{esc(value)}</text>
                <text x="80" y="62" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="700" text-anchor="middle" fill="#cbd5e1">{esc(label)}</text>
              </g>''')

          write(
              assets / "github-summary.svg",
              f'''<svg width="800" height="220" viewBox="0 0 800 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub summary">
          <rect width="800" height="220" rx="22" fill="#020617"/>
          <text x="28" y="42" font-family="Inter, Segoe UI, Arial" font-size="24" font-weight="800" fill="#ffffff">GitHub command center</text>
          <text x="28" y="66" font-family="Inter, Segoe UI, Arial" font-size="14" fill="#94a3b8">{esc(name)} · @{esc(username)}</text>
          {''.join(card_svg)}
          <text x="400" y="200" font-family="Inter, Segoe UI, Arial" font-size="12" text-anchor="middle" fill="#64748b">Local SVG generated by GitHub Actions to avoid public stats fetch errors.</text>
          </svg>''',
          )

          featured = sorted(
              public_repos,
              key=lambda r: ((r.get("stargazers_count") or 0), (r.get("forks_count") or 0), r.get("updated_at") or ""),
              reverse=True,
          )[:4]
          rows = []
          for i, repo in enumerate(featured):
              y = 76 + i * 58
              desc = (repo.get("description") or "No description yet.")[:82]
              rows.append(f'''
              <g transform="translate(28,{y})">
                <rect width="744" height="46" rx="14" fill="#0f172a" stroke="#1e293b"/>
                <text x="16" y="20" font-family="Inter, Segoe UI, Arial" font-size="15" font-weight="800" fill="#ffffff">{esc(repo.get("name", "repository"))}</text>
                <text x="16" y="36" font-family="Inter, Segoe UI, Arial" font-size="11" fill="#94a3b8">{esc(desc)}</text>
                <text x="720" y="28" font-family="Inter, Segoe UI, Arial" font-size="12" text-anchor="end" fill="#22d3ee">★ {repo.get("stargazers_count", 0)} · Fork {repo.get("forks_count", 0)}</text>
              </g>''')

          if not rows:
              rows.append('<text x="28" y="95" font-family="Inter, Segoe UI, Arial" font-size="15" fill="#cbd5e1">Featured repositories will appear after the workflow can access public repository data.</text>')

          write(
              assets / "featured-projects.svg",
              f'''<svg width="800" height="340" viewBox="0 0 800 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured public repositories">
          <rect width="800" height="340" rx="22" fill="#020617"/>
          <text x="28" y="42" font-family="Inter, Segoe UI, Arial" font-size="24" font-weight="800" fill="#ffffff">Featured public repositories</text>
          <text x="28" y="64" font-family="Inter, Segoe UI, Arial" font-size="13" fill="#94a3b8">Sorted by stars, forks, and recent activity.</text>
          {''.join(rows)}
          </svg>''',
          )

          fallback = '''<svg width="800" height="220" viewBox="0 0 800 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Contribution arcade fallback">
          <rect width="800" height="220" rx="22" fill="#020617"/>
          <text x="400" y="94" font-family="Inter, Segoe UI, Arial" font-size="28" font-weight="800" text-anchor="middle" fill="#ffffff">Contribution arcade</text>
          <text x="400" y="126" font-family="Inter, Segoe UI, Arial" font-size="15" text-anchor="middle" fill="#94a3b8">Animation is being generated. This local fallback prevents broken fetch-error cards.</text>
          <text x="400" y="156" font-family="Inter, Segoe UI, Arial" font-size="13" text-anchor="middle" fill="#22d3ee">Run the workflow again if you want to refresh the animation.</text>
          </svg>'''
          for name in [
              "github-contribution-grid-snake.svg",
              "github-contribution-grid-snake-dark.svg",
              "pacman-contribution-graph.svg",
              "pacman-contribution-graph-dark.svg",
          ]:
              path = output / name
              if not path.exists() or path.stat().st_size == 0:
                  write(path, fallback)
          PY

      - name: Try to generate snake animation
        continue-on-error: true
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: hieudepoet
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(profile): update generated README assets"
          file_pattern: "assets/*.svg output/*.svg"
